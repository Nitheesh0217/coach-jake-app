<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05050a"/>
      <stop offset="100%" style="stop-color:#08080f"/>
    </linearGradient>
    <linearGradient id="splitLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#ff6b00;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#ff9a3c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="athleteGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:0.95"/>
      <stop offset="85%" style="stop-color:#ff6b00;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="70%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#ff9a3c"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#ff6b0022"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00d4ff22"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#a78bfa22"/>
    </linearGradient>
    <radialGradient id="floorGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0"/>
    </radialGradient>
    <filter id="g4">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g8">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g16">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="fadeMask">
      <linearGradient id="fm" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:white;stop-opacity:1"/>
        <stop offset="78%" style="stop-color:white;stop-opacity:1"/>
        <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
      </linearGradient>
      <rect width="480" height="400" fill="url(#fm)"/>
    </mask>
    <clipPath id="clip"><rect width="1200" height="400" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="1200" height="400" fill="url(#bg)"/>

    <!-- Right panel ambient glow -->
    <ellipse cx="850" cy="200" rx="380" ry="220" fill="url(#rightGlow)"/>

    <!-- Subtle noise texture via tiny dots -->
    <g fill="#ffffff" opacity="0.03">
      <circle cx="100" cy="50" r="1"/><circle cx="300" cy="30" r="1"/>
      <circle cx="500" cy="70" r="1"/><circle cx="700" cy="20" r="1"/>
      <circle cx="900" cy="55" r="1"/><circle cx="1100" cy="35" r="1"/>
      <circle cx="200" cy="380" r="1"/><circle cx="600" cy="390" r="1"/>
      <circle cx="1000" cy="375" r="1"/>
    </g>

    <!-- ===== LEFT — ATHLETE SILHOUETTE ===== -->
    <g mask="url(#fadeMask)">
      <!-- Floor glow beneath feet -->
      <ellipse cx="240" cy="390" rx="150" ry="20" fill="url(#floorGlow)"/>

      <!-- Court arc echoes -->
      <g fill="none" stroke="#ff6b00" opacity="0.06">
        <ellipse cx="240" cy="410" rx="300" ry="110"/>
        <ellipse cx="240" cy="410" rx="210" ry="76"/>
        <ellipse cx="240" cy="410" rx="130" ry="48"/>
      </g>

      <!-- Athlete silhouette — jump-shot pose -->
      <g fill="url(#athleteGrad)">
        <!-- right leg angled back -->
        <ellipse cx="255" cy="348" rx="13" ry="44" transform="rotate(18 255 348)"/>
        <!-- left leg forward -->
        <ellipse cx="215" cy="352" rx="13" ry="42" transform="rotate(-12 215 352)"/>
        <!-- shorts -->
        <rect x="200" y="282" width="72" height="38" rx="8"/>
        <!-- torso -->
        <rect x="204" y="192" width="64" height="96" rx="12"/>
        <!-- left arm out for balance -->
        <ellipse cx="178" cy="230" rx="11" ry="42" transform="rotate(-45 178 230)"/>
        <!-- right arm raised with ball -->
        <ellipse cx="298" cy="178" rx="11" ry="52" transform="rotate(28 298 178)"/>
        <!-- neck -->
        <rect x="224" y="172" width="20" height="24" rx="6"/>
        <!-- head -->
        <circle cx="234" cy="148" r="28"/>
      </g>

      <!-- Basketball -->
      <circle cx="316" cy="128" r="24" fill="#bf4f00" filter="url(#g8)"/>
      <circle cx="316" cy="128" r="24" fill="#ff6b00" opacity="0.55"/>
      <g stroke="#1a0400" stroke-width="1.8" fill="none">
        <line x1="316" y1="104" x2="316" y2="152"/>
        <line x1="292" y1="128" x2="340" y2="128"/>
        <path d="M316,104 C303,115 297,122 297,128 C297,134 303,141 316,152"/>
        <path d="M316,104 C329,115 335,122 335,128 C335,134 329,141 316,152"/>
      </g>
      <ellipse cx="307" cy="118" rx="7" ry="4" fill="white" opacity="0.18" transform="rotate(-30 307 118)"/>

      <!-- Motion trail streaks -->
      <g stroke="#ff6b00" stroke-width="1" fill="none" opacity="0.12">
        <path d="M50,180 C90,168 140,175 180,188"/>
        <path d="M30,220 C80,208 130,215 175,228"/>
        <path d="M60,260 C100,250 148,256 186,268"/>
        <path d="M45,145 C85,135 130,142 168,154"/>
      </g>
    </g>

    <!-- ===== VERTICAL DIVIDER ===== -->
    <rect x="488" y="0" width="2" height="400" fill="url(#splitLine)" filter="url(#g4)"/>
    <!-- diamond pip -->
    <polygon points="489,197 498,206 489,215 480,206" fill="#ff9a3c" filter="url(#g8)"/>

    <!-- ===== RIGHT — CONTENT ===== -->

    <!-- Label -->
    <text x="540" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#ff6b00" letter-spacing="5" filter="url(#g4)">COACH JAKE</text>

    <!-- Main title -->
    <text x="538" y="125" font-family="'Segoe UI', Arial Black, sans-serif" font-size="70" font-weight="900" fill="#ff6b00" opacity="0.18" filter="url(#g16)">Level Up.</text>
    <text x="538" y="125" font-family="'Segoe UI', Arial Black, sans-serif" font-size="70" font-weight="900" fill="url(#titleGrad)" filter="url(#g8)">Level Up.</text>

    <!-- Subtitle -->
    <text x="540" y="158" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="300" fill="#64748b" letter-spacing="0.5">AI-Powered Basketball Fitness Coaching Platform</text>

    <!-- Thin divider -->
    <rect x="540" y="172" width="620" height="1" fill="#1e2535"/>

    <!-- ===== STAT CARDS ===== -->
    <!-- Card: Sessions -->
    <rect x="540" y="184" width="148" height="72" rx="8" fill="#0c0c16" stroke="#ff6b0033" stroke-width="1"/>
    <rect x="540" y="184" width="3" height="72" rx="1.5" fill="#ff6b00" filter="url(#g4)"/>
    <text x="556" y="206" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569" letter-spacing="2">SESSIONS</text>
    <text x="556" y="234" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#ffffff">1,247</text>
    <text x="556" y="250" font-family="'Segoe UI', sans-serif" font-size="10" fill="#ff6b00">↑ 18% this month</text>

    <!-- Card: Streak -->
    <rect x="700" y="184" width="148" height="72" rx="8" fill="#0c0c16" stroke="#00d4ff33" stroke-width="1"/>
    <rect x="700" y="184" width="3" height="72" rx="1.5" fill="#00d4ff" filter="url(#g4)"/>
    <text x="716" y="206" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569" letter-spacing="2">STREAK</text>
    <text x="716" y="234" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#ffffff">14d</text>
    <text x="716" y="250" font-family="'Segoe UI', sans-serif" font-size="10" fill="#00d4ff">▲ Personal best</text>

    <!-- Card: Athletes -->
    <rect x="860" y="184" width="148" height="72" rx="8" fill="#0c0c16" stroke="#a78bfa33" stroke-width="1"/>
    <rect x="860" y="184" width="3" height="72" rx="1.5" fill="#a78bfa" filter="url(#g4)"/>
    <text x="876" y="206" font-family="'Segoe UI', sans-serif" font-size="9" fill="#475569" letter-spacing="2">ATHLETES</text>
    <text x="876" y="234" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#ffffff">48</text>
    <text x="876" y="250" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a78bfa">Active roster</text>

    <!-- ===== PROGRESS BARS ===== -->
    <text x="540" y="284" font-family="monospace" font-size="9" fill="#334155" letter-spacing="3">WEEKLY METRICS</text>

    <!-- STR -->
    <text x="540" y="305" font-family="'Segoe UI', sans-serif" font-size="10" fill="#475569">STR</text>
    <rect x="574" y="295" width="370" height="7" rx="3.5" fill="#0f0f1e"/>
    <rect x="574" y="295" width="296" height="7" rx="3.5" fill="url(#bar1)" filter="url(#g4)"/>
    <text x="952" y="304" font-family="monospace" font-size="9" fill="#ff6b00">80%</text>

    <!-- SPD -->
    <text x="540" y="323" font-family="'Segoe UI', sans-serif" font-size="10" fill="#475569">SPD</text>
    <rect x="574" y="313" width="370" height="7" rx="3.5" fill="#0f0f1e"/>
    <rect x="574" y="313" width="240" height="7" rx="3.5" fill="url(#bar2)" filter="url(#g4)"/>
    <text x="952" y="322" font-family="monospace" font-size="9" fill="#00d4ff">65%</text>

    <!-- AGI -->
    <text x="540" y="341" font-family="'Segoe UI', sans-serif" font-size="10" fill="#475569">AGI</text>
    <rect x="574" y="331" width="370" height="7" rx="3.5" fill="#0f0f1e"/>
    <rect x="574" y="331" width="333" height="7" rx="3.5" fill="url(#bar3)" filter="url(#g4)"/>
    <text x="952" y="340" font-family="monospace" font-size="9" fill="#a78bfa">90%</text>

    <!-- ===== HEARTBEAT PULSE LINE ===== -->
    <polyline
      points="540,368 570,368 582,354 594,381 606,346 618,385 630,368 680,368 692,368 704,358 716,376 728,350 740,384 752,368 1140,368"
      fill="none" stroke="#ff6b00" stroke-width="1.5" opacity="0.55" filter="url(#g4)"/>
    <circle cx="752" cy="368" r="3.5" fill="#ff6b00" filter="url(#g8)"/>
    <!-- Pulse label -->
    <text x="770" y="372" font-family="monospace" font-size="9" fill="#ff6b00" opacity="0.4">LIVE ACTIVITY</text>

    <!-- ===== TECH BADGES ===== -->
    <g font-family="monospace" font-size="10" font-weight="600">
      <rect x="540" y="385" width="78" height="18" rx="3" fill="#0a0a14" stroke="#1e1e2e" stroke-width="1"/>
      <text x="579" y="398" text-anchor="middle" fill="#cbd5e1">Next.js 16</text>

      <rect x="626" y="385" width="82" height="18" rx="3" fill="#0a0a14" stroke="#3178C6" stroke-width="1"/>
      <text x="667" y="398" text-anchor="middle" fill="#3178C6">TypeScript</text>

      <rect x="716" y="385" width="76" height="18" rx="3" fill="#0a0a14" stroke="#3ECF8E" stroke-width="1"/>
      <text x="754" y="398" text-anchor="middle" fill="#3ECF8E">Supabase</text>

      <rect x="800" y="385" width="84" height="18" rx="3" fill="#0a0a14" stroke="#06B6D4" stroke-width="1"/>
      <text x="842" y="398" text-anchor="middle" fill="#06B6D4">Tailwind v4</text>

      <rect x="892" y="385" width="60" height="18" rx="3" fill="#0a0a14" stroke="#444" stroke-width="1"/>
      <text x="922" y="398" text-anchor="middle" fill="#94a3b8">Vercel</text>
    </g>

    <!-- Outer border -->
    <rect x="1" y="1" width="1198" height="398" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.1" rx="14"/>
  </g>
</svg>
